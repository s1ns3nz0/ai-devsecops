title: SQL Injection Attempt
id: sqli-001
status: stable
level: high
description: Detects SQL injection patterns in request paths
logsource:
  category: application
  product: payment-api
detection:
  selection:
    event_type: api_request
    path|contains:
      - "OR 1=1"
      - "UNION SELECT"
      - "DROP TABLE"
      - "' OR '"
  condition: selection
tags:
  - attack.t1190
control_ids:
  - PCI-DSS-6.3.1
  - ASVS-V5.3.4
