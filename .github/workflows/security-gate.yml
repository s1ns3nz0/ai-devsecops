name: Security Gate

# ─────────────────────────────────────────────────────
# TEST + GATE phase (PR only)
#
# This workflow runs ONLY the scanners not already run
# in the DEVELOP phase (ci.yml security-scan job):
#
#   DEVELOP phase (ci.yml):     SAST, IaC, Secrets (fast, every push)
#   TEST + GATE phase (this):   SCA, SBOM, EPSS, Threat Model, Gate (PR only)
#
# The gate aggregates ALL findings (develop + test) for
# the final pass/fail decision.
# ─────────────────────────────────────────────────────

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      product:
        description: "Product name to assess"
        default: "payment-api"
        type: string

concurrency:
  group: security-gate-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  security-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install platform
        run: pip install -e ".[dev]"

      - name: Install SCA + SBOM tools (not already in develop phase)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      # ── SCA: Dependency vulnerability scan (not in develop phase) ──
      - name: SCA scan (Grype)
        id: sca
        continue-on-error: true
        run: |
          set -o pipefail
          PRODUCT="${{ inputs.product || 'payment-api' }}"

          python -m orchestrator scan . --product "${PRODUCT}" \
            2>&1 | tee assessment-output.txt

      # ── SBOM: Software Bill of Materials ──
      - name: Generate SBOM (Syft)
        continue-on-error: true
        run: |
          python -m orchestrator sbom . --output-dir output
          echo "SBOM generated" >> assessment-output.txt

      # ── EPSS: Exploit probability enrichment ──
      - name: EPSS enrichment
        continue-on-error: true
        run: |
          python3 -c "
          from orchestrator.intelligence.epss import EpssClient
          from orchestrator.evidence.jsonl import JsonlWriter
          import json

          # Read CVE IDs from findings
          reader = JsonlWriter('output/findings.jsonl')
          entries = reader.read_findings()
          cve_ids = [e['data']['rule_id'] for e in entries if e['data'].get('rule_id','').startswith('CVE-')]

          if cve_ids:
              client = EpssClient()
              scores = client.get_scores(cve_ids)
              enriched = {cve: {'epss': s.epss, 'percentile': s.percentile} for cve, s in scores.items()}
              print(f'EPSS: {len(enriched)}/{len(cve_ids)} CVEs enriched')
              critical = sum(1 for s in scores.values() if s.epss > 0.5)
              if critical:
                  print(f'EPSS CRITICAL: {critical} CVEs with >50% exploit probability')
          else:
              print('EPSS: no CVEs to enrich')
          " 2>&1 | tee -a assessment-output.txt

      # ── Threat Model: Component-based threat scenarios ──
      - name: Threat model generation
        continue-on-error: true
        run: |
          PRODUCT="${{ inputs.product || 'payment-api' }}"
          python -m orchestrator threat-model . --product "${PRODUCT}" --output output \
            2>&1 | tee -a assessment-output.txt

      # ── Gate: Aggregate all findings + evaluate ──
      - name: Gate evaluation
        id: gate
        continue-on-error: true
        run: |
          set -o pipefail
          PRODUCT="${{ inputs.product || 'payment-api' }}"

          # Run full assessment (re-runs scanners that are available, aggregates all)
          python -m orchestrator assess . \
            --product "${PRODUCT}" \
            --trigger pre_merge \
            2>&1 | tee -a assessment-output.txt

      # ── Sigma: Detection rules against logs (if available) ──
      - name: Sigma detection
        continue-on-error: true
        run: |
          PRODUCT="${{ inputs.product || 'payment-api' }}"
          if [ -f tests/fixtures/sample-app/logs/access.jsonl ]; then
            python -m orchestrator detect tests/fixtures/sample-app/logs/access.jsonl \
              --product "${PRODUCT}" \
              2>&1 | tee -a assessment-output.txt
          fi

      # ── Evidence: Export audit-ready report ──
      - name: Export evidence
        continue-on-error: true
        run: |
          PRODUCT="${{ inputs.product || 'payment-api' }}"
          python -m orchestrator export \
            --product "${PRODUCT}" \
            --output output/evidence \
            2>&1 | tee -a assessment-output.txt

      # ── PR Comment: Post results ──
      - name: Post gate results to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('assessment-output.txt', 'utf8');
            const outcome = '${{ steps.gate.outcome }}';
            const icon = outcome === 'success' ? '✅' : '🚫';
            const status = outcome === 'success' ? 'PASSED' : 'BLOCKED';

            let evidenceReport = '';
            try {
              const files = fs.readdirSync('output/evidence');
              const jsonFile = files.find(f => f.endsWith('.json'));
              if (jsonFile) {
                const report = JSON.parse(fs.readFileSync(`output/evidence/${jsonFile}`, 'utf8'));
                const exec = report.executive_summary || {};
                const controls = exec.controls || [];
                evidenceReport = '\n### Evidence by Control\n\n';
                evidenceReport += '| Control | Status | Findings | Scanners |\n';
                evidenceReport += '|---------|--------|----------|----------|\n';
                for (const c of controls) {
                  const statusIcon = {full: '🟢', partial: '🟡', none: '🔴'}[c.status] || '⚪';
                  evidenceReport += `| ${statusIcon} ${c.control_id} | ${c.status} | ${c.findings_count} | ${c.scanners.join(', ') || '—'} |\n`;
                }
                evidenceReport += `\n**Coverage: ${report.summary.coverage_percentage}%** (${report.summary.fully_evidenced} full, ${report.summary.partially_evidenced} partial, ${report.summary.no_evidence} none)\n`;
              }
            } catch (e) { /* no evidence report available */ }

            // Check for threat model
            let threatInfo = '';
            try {
              const tmFiles = fs.readdirSync('output').filter(f => f.startsWith('threat-model-'));
              if (tmFiles.length > 0) {
                threatInfo = '\n### Threat Model\nSee uploaded artifacts for component-based threat scenarios with MITRE ATT&CK mapping.\n';
              }
            } catch (e) { /* no threat model */ }

            const marker = '<!-- security-gate-result -->';
            const body = [
              marker,
              `## ${icon} Security Gate: ${status}`,
              '',
              '### Pipeline Phases',
              '`[DEVELOP: SAST+IaC+Secrets]` → `[TEST: SCA+SBOM+EPSS]` → `[GATE: Threshold+OPA]` → `[EVIDENCE]`',
              '',
              '<details>',
              '<summary>Full Assessment Output</summary>',
              '',
              '```',
              output,
              '```',
              '',
              '</details>',
              evidenceReport,
              threatInfo,
              '---',
              '*Compliance-Driven AI Risk Platform — DEVELOP phase (SAST/IaC/Secrets) runs on every push, TEST+GATE phase (SCA/SBOM/EPSS) runs on PR*',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Write job summary
        if: always()
        run: |
          echo "## Security Gate Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Pipeline: \`DEVELOP (SAST/IaC/Secrets)\` → \`TEST (SCA/SBOM/EPSS)\` → \`GATE\` → \`EVIDENCE\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat assessment-output.txt >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true

      - name: Upload evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-evidence
          path: |
            output/findings.jsonl
            output/evidence/
            output/sbom-*.cdx.json
            output/threat-model-*.yaml
            assessment-output.txt
          retention-days: 365

      - name: Enforce gate decision
        if: steps.gate.outcome == 'failure'
        run: |
          echo "::error::Security gate BLOCKED — critical findings exceed threshold"
          exit 1
