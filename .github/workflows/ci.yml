name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy orchestrator/

      - name: Unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Contract tests
        run: pytest tests/contract/ -v --tb=short

  # ─────────────────────────────────────────────────────
  # DEVELOP PHASE: Fast security feedback on every push
  #
  # Purpose: developer warnings, NOT gate decisions.
  # These results are informational — fast feedback to fix
  # issues before opening a PR.
  #
  # The real security gate runs in security-gate.yml (PR only).
  # ─────────────────────────────────────────────────────
  security-warnings:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'  # Push only, not PR (gate handles PR)
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Secrets scan (Gitleaks)
        continue-on-error: true
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz -C /usr/local/bin gitleaks
          gitleaks detect --source . --no-git 2>&1 || true
          # Informational only — does not block push

      - name: SAST quick scan (Semgrep)
        continue-on-error: true
        run: |
          pip install semgrep
          FINDINGS=$(semgrep scan --json --quiet . 2>/dev/null | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('results',[])))" 2>/dev/null || echo "0")
          if [ "$FINDINGS" -gt 0 ]; then
            echo "::warning::Semgrep found $FINDINGS security findings — review before PR"
          fi
