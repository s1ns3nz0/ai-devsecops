# Note: OWASP ASVS 5.0 is not yet released at time of writing. Control IDs
# are based on ASVS 4.0.3 (the current stable release) and may change in 5.0.
# The "5.0-L3" label reflects the target baseline level for this platform.
controls:
  - control:
      id: "ASVS-V2.10.1"
      title: "No hardcoded credentials in source code"
      framework: "asvs-5.0-L3"
      description: "Verify that integration secrets do not rely on unchanging credentials such as passwords, API keys, or shared privileged accounts."
      verification_methods:
        - scanner: gitleaks
        - scanner: semgrep
          rules:
            - "python.lang.security.audit.hardcoded-password.*"
      applicable_tiers:
        - medium
        - high
        - critical
      risk_tier_mapping:
        low: not-required
        medium: required
        high: required
        critical: required

  - control:
      id: "ASVS-V3.5.1"
      title: "JWT validation requirements"
      framework: "asvs-5.0-L3"
      description: "Verify that the application uses only signed JWTs for authentication and does not accept unsigned or weakly signed tokens."
      verification_methods:
        - scanner: semgrep
          rules:
            - "python.jwt.security.*"
      applicable_tiers:
        - medium
        - high
        - critical
      risk_tier_mapping:
        low: not-required
        medium: required
        high: required
        critical: required

  - control:
      id: "ASVS-V5.3.4"
      title: "SQL injection prevention"
      framework: "asvs-5.0-L3"
      description: "Verify that the application uses parameterized queries or ORM to prevent SQL injection attacks."
      verification_methods:
        - scanner: semgrep
          rules:
            - "python.lang.security.injection.*"
            - "python.django.security.injection.*"
      applicable_tiers:
        - medium
        - high
        - critical
      risk_tier_mapping:
        low: not-required
        medium: required
        high: required
        critical: required

  - control:
      id: "ASVS-V14.2.1"
      title: "Dependency vulnerability management"
      framework: "asvs-5.0-L3"
      description: "Verify that all components are up to date with proper security patches and free from known vulnerabilities."
      verification_methods:
        - scanner: grype
          severity_threshold: high
      applicable_tiers:
        - medium
        - high
        - critical
      risk_tier_mapping:
        low: not-required
        medium: required
        high: required
        critical: required
