controls:
  - control:
      id: "PCI-DSS-1.3.4"
      title: "Connections between trusted and untrusted networks are controlled"
      framework: "pci-dss-4.0"
      description: "Network segmentation controls to restrict inbound traffic to only necessary and authorized communications."
      verification_methods:
        - scanner: checkov
          check_ids:
            - "CKV_AWS_24"
      applicable_tiers:
        - high
        - critical
      risk_tier_mapping:
        low: not-required
        medium: not-required
        high: required
        critical: required

  - control:
      id: "PCI-DSS-3.4"
      title: "PAN is secured with strong cryptography during storage"
      framework: "pci-dss-4.0"
      description: "Render PAN unreadable anywhere it is stored using strong cryptography with associated key management."
      verification_methods:
        - scanner: checkov
          check_ids:
            - "CKV_AWS_18"
            - "CKV_AWS_19"
      applicable_tiers:
        - high
        - critical
      risk_tier_mapping:
        low: not-required
        medium: not-required
        high: required
        critical: required

  - control:
      id: "PCI-DSS-3.5.1"
      title: "Access to cryptographic keys is restricted"
      framework: "pci-dss-4.0"
      description: "Restrict access to cleartext cryptographic key components to the fewest number of custodians necessary."
      verification_methods:
        - scanner: gitleaks
      applicable_tiers:
        - high
        - critical
      risk_tier_mapping:
        low: not-required
        medium: recommended
        high: required
        critical: required

  - control:
      id: "PCI-DSS-6.3.1"
      title: "Security vulnerabilities are identified and addressed"
      framework: "pci-dss-4.0"
      description: "Identify security vulnerabilities using reputable sources and assign risk ranking based on industry best practices."
      verification_methods:
        - scanner: semgrep
          rules:
            - "python.lang.security.*"
        - scanner: grype
          severity_threshold: high
      applicable_tiers:
        - high
        - critical
      risk_tier_mapping:
        low: not-required
        medium: recommended
        high: required
        critical: required

  - control:
      id: "PCI-DSS-10.2.1"
      title: "Audit log coverage for all system components"
      framework: "pci-dss-4.0"
      description: "Audit logs are enabled and active for all system components to support the identification of suspicious activity."
      verification_methods:
        - scanner: sigma
      applicable_tiers:
        - high
        - critical
      risk_tier_mapping:
        low: not-required
        medium: not-required
        high: required
        critical: required
